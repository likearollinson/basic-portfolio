<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="640" height="480" shape-rendering="crispEdges">
  <!-- Sky background -->
  <rect width="320" height="240" fill="#87CEEB"/>

  <!-- Sun -->
  <rect x="260" y="20" width="8" height="8" fill="#FFD700"/>
  <rect x="268" y="20" width="8" height="8" fill="#FFD700"/>
  <rect x="252" y="28" width="8" height="8" fill="#FFD700"/>
  <rect x="260" y="28" width="8" height="8" fill="#FFD700"/>
  <rect x="268" y="28" width="8" height="8" fill="#FFD700"/>
  <rect x="276" y="28" width="8" height="8" fill="#FFD700"/>
  <rect x="252" y="36" width="8" height="8" fill="#FFD700"/>
  <rect x="260" y="36" width="8" height="8" fill="#FFD700"/>
  <rect x="268" y="36" width="8" height="8" fill="#FFD700"/>
  <rect x="276" y="36" width="8" height="8" fill="#FFD700"/>
  <rect x="260" y="44" width="8" height="8" fill="#FFD700"/>
  <rect x="268" y="44" width="8" height="8" fill="#FFD700"/>

  <!-- Clouds -->
  <rect x="40" y="30" width="8" height="8" fill="white"/>
  <rect x="48" y="22" width="8" height="8" fill="white"/>
  <rect x="56" y="22" width="8" height="8" fill="white"/>
  <rect x="64" y="22" width="8" height="8" fill="white"/>
  <rect x="48" y="30" width="8" height="8" fill="white"/>
  <rect x="56" y="30" width="8" height="8" fill="white"/>
  <rect x="64" y="30" width="8" height="8" fill="white"/>
  <rect x="72" y="30" width="8" height="8" fill="white"/>

  <rect x="160" y="40" width="8" height="8" fill="white"/>
  <rect x="168" y="32" width="8" height="8" fill="white"/>
  <rect x="176" y="32" width="8" height="8" fill="white"/>
  <rect x="168" y="40" width="8" height="8" fill="white"/>
  <rect x="176" y="40" width="8" height="8" fill="white"/>
  <rect x="184" y="40" width="8" height="8" fill="white"/>

  <!-- Ocean background -->
  <rect x="0" y="140" width="320" height="100" fill="#1E90FF"/>

  <!-- Wave back -->
  <rect x="0" y="132" width="320" height="16" fill="#00BFFF"/>
  <rect x="0" y="124" width="40" height="8" fill="#00BFFF"/>
  <rect x="40" y="116" width="48" height="8" fill="#00BFFF"/>
  <rect x="88" y="124" width="40" height="8" fill="#00BFFF"/>
  <rect x="128" y="116" width="56" height="8" fill="#00BFFF"/>
  <rect x="184" y="124" width="48" height="8" fill="#00BFFF"/>
  <rect x="232" y="132" width="88" height="8" fill="#00BFFF"/>

  <!-- Wave white foam back -->
  <rect x="40" y="116" width="8" height="8" fill="white"/>
  <rect x="128" y="116" width="8" height="8" fill="white"/>
  <rect x="136" y="108" width="8" height="8" fill="white"/>

  <!-- Main big wave -->
  <rect x="0" y="168" width="320" height="72" fill="#1565C0"/>
  <rect x="0" y="160" width="100" height="8" fill="#1E90FF"/>
  <rect x="100" y="152" width="80" height="8" fill="#1E90FF"/>
  <rect x="180" y="144" width="60" height="8" fill="#1E90FF"/>
  <rect x="240" y="136" width="80" height="8" fill="#1E90FF"/>

  <!-- Wave curl / barrel -->
  <rect x="180" y="136" width="8" height="8" fill="#00BFFF"/>
  <rect x="188" y="128" width="16" height="8" fill="#00BFFF"/>
  <rect x="204" y="120" width="16" height="8" fill="#00BFFF"/>
  <rect x="220" y="128" width="16" height="8" fill="#00BFFF"/>
  <rect x="236" y="136" width="8" height="8" fill="#00BFFF"/>

  <!-- Wave foam -->
  <rect x="188" y="128" width="8" height="8" fill="white"/>
  <rect x="204" y="120" width="8" height="8" fill="white"/>
  <rect x="220" y="128" width="8" height="8" fill="white"/>
  <rect x="100" y="152" width="8" height="8" fill="white"/>
  <rect x="240" y="136" width="8" height="8" fill="white"/>

  <!-- Surfboard -->
  <rect x="100" y="160" width="88" height="8" fill="#FF4500"/>
  <rect x="96" y="160" width="8" height="8" fill="#FF6347"/>
  <rect x="184" y="160" width="8" height="8" fill="#FF6347"/>
  <rect x="92" y="160" width="8" height="8" fill="#FF7F50"/>
  <rect x="188" y="160" width="8" height="8" fill="#FF7F50"/>
  <!-- Board stripe -->
  <rect x="100" y="160" width="88" height="2" fill="#FFD700"/>

  <!-- Surfer body - legs -->
  <rect x="136" y="152" width="8" height="8" fill="#1E90FF"/><!-- left leg (wetsuit) -->
  <rect x="152" y="152" width="8" height="8" fill="#1E90FF"/><!-- right leg -->
  <rect x="136" y="144" width="8" height="8" fill="#1E90FF"/><!-- left knee -->
  <rect x="152" y="148" width="8" height="8" fill="#1E90FF"/><!-- right knee -->

  <!-- Surfer body - torso -->
  <rect x="136" y="128" width="24" height="16" fill="#FF6600"/><!-- wetsuit top -->
  <rect x="132" y="128" width="8" height="8" fill="#FF6600"/>
  <rect x="156" y="128" width="8" height="8" fill="#FF6600"/>

  <!-- Surfer left arm (extended for balance) -->
  <rect x="112" y="132" width="24" height="8" fill="#F4A460"/><!-- arm skin -->
  <rect x="108" y="132" width="8" height="8" fill="#F4A460"/><!-- hand -->

  <!-- Surfer right arm (raised) -->
  <rect x="160" y="120" width="16" height="8" fill="#F4A460"/>
  <rect x="172" y="116" width="8" height="8" fill="#F4A460"/><!-- hand raised -->

  <!-- Surfer neck -->
  <rect x="144" y="120" width="8" height="8" fill="#F4A460"/>

  <!-- Surfer head -->
  <rect x="136" y="108" width="24" height="16" fill="#F4A460"/>

  <!-- Surfer hair -->
  <rect x="136" y="108" width="24" height="8" fill="#8B4513"/>
  <rect x="132" y="108" width="8" height="8" fill="#8B4513"/>

  <!-- Surfer eyes -->
  <rect x="140" y="116" width="4" height="4" fill="#333"/>
  <rect x="152" y="116" width="4" height="4" fill="#333"/>

  <!-- Surfer smile -->
  <rect x="140" y="120" width="4" height="2" fill="#333"/>
  <rect x="148" y="122" width="8" height="2" fill="#333"/>

  <!-- Sunglasses -->
  <rect x="139" y="114" width="6" height="4" fill="#222" opacity="0.8"/>
  <rect x="151" y="114" width="6" height="4" fill="#222" opacity="0.8"/>
  <rect x="145" y="114" width="6" height="2" fill="#222" opacity="0.8"/>

  <!-- Splash effects -->
  <rect x="92" y="164" width="8" height="4" fill="white" opacity="0.8"/>
  <rect x="84" y="168" width="8" height="4" fill="white" opacity="0.6"/>
  <rect x="196" y="164" width="8" height="4" fill="white" opacity="0.8"/>
  <rect x="204" y="168" width="8" height="4" fill="white" opacity="0.6"/>

  <!-- Pixel grid overlay effect (subtle) -->
  <!-- Small birds in sky -->
  <rect x="80" y="60" width="4" height="2" fill="#555"/>
  <rect x="88" y="60" width="4" height="2" fill="#555"/>
  <rect x="84" y="58" width="4" height="2" fill="#555"/>

  <rect x="200" y="50" width="4" height="2" fill="#555"/>
  <rect x="208" y="50" width="4" height="2" fill="#555"/>
  <rect x="204" y="48" width="4" height="2" fill="#555"/>

</svg>
